<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoLogix - Cadastro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .eco-wrap { background: var(--verde-escuro); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .eco-card { background: #fff; border-radius: var(--border-radius-lg); border: 1px solid var(--color-border-tertiary); padding: 2rem 2.25rem; width: 400px; }
    .eco-label { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 6px; display: block; }
    .eco-input-wrap { position: relative; margin-bottom: 1rem; }
    .eco-input-wrap i { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--color-text-secondary); }
    .eco-input-wrap input, .eco-input-wrap select { padding-left: 34px; width: 100%; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .eco-btn { width: 100%; padding: 10px; margin-top: 0.25rem; justify-content: center; }
    .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
    .role { border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 8px; text-align: center; cursor: pointer; font-size: 12px; color: var(--color-text-secondary); }
    .role.active { border: 2px solid var(--verde); background: var(--verde-pastel); color: var(--verde); font-weight: 500; }
    .role i { display: block; font-size: 20px; margin-bottom: 4px; }
    .sec { font-size: 11px; font-weight: 600; color: var(--color-text-secondary); letter-spacing: 0.06em; text-transform: uppercase; margin: 0.5rem 0 0.6rem; }
  </style>
</head>
<body>
  <div class="eco-wrap">
    <div class="eco-card">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:1.25rem;">
        <div style="width:36px; height:36px; background:var(--verde); border-radius:var(--border-radius-md); display:flex; align-items:center; justify-content:center;">
          <i class="ti ti-leaf" style="font-size:20px; color:var(--verde-claro);"></i>
        </div>
        <div>
          <p style="font-size:16px; font-weight:600; margin:0;">Criar conta &mdash; EcoLogix</p>
          <p style="font-size:11px; color:var(--color-text-secondary); margin:0;">GreenCycle Solucoes Ambientais</p>
        </div>
      </div>

      <form id="form-cad">
        <p class="sec">Tipo de perfil</p>
        <div class="role-grid" id="roles">
          <div class="role active" data-role="cliente"><i class="ti ti-building-store"></i>Cliente</div>
          <div class="role" data-role="motorista"><i class="ti ti-truck"></i>Motorista</div>
          <div class="role" data-role="atendente"><i class="ti ti-headset"></i>Atendente</div>
          <div class="role" data-role="gerente"><i class="ti ti-chart-bar"></i>Gerente</div>
        </div>

        <p class="sec">Dados pessoais</p>
        <div class="row">
          <div>
            <label class="eco-label">Nome</label>
            <div class="eco-input-wrap"><i class="ti ti-user"></i><input type="text" id="nome" placeholder="Nome" required></div>
          </div>
          <div>
            <label class="eco-label">Sobrenome</label>
            <div class="eco-input-wrap"><i class="ti ti-user"></i><input type="text" id="sobrenome" placeholder="Sobrenome"></div>
          </div>
        </div>

        <label class="eco-label">E-mail</label>
        <div class="eco-input-wrap"><i class="ti ti-mail"></i><input type="email" id="email" placeholder="seu@email.com" required></div>

        <label class="eco-label">CNPJ / CPF</label>
        <div class="eco-input-wrap"><i class="ti ti-id"></i><input type="text" id="cnpj" placeholder="00.000.000/0001-00"></div>

        <div class="row">
          <div>
            <label class="eco-label">Senha</label>
            <div class="eco-input-wrap"><i class="ti ti-lock"></i><input type="password" id="senha" placeholder="********" required></div>
          </div>
          <div>
            <label class="eco-label">Confirmar</label>
            <div class="eco-input-wrap"><i class="ti ti-lock-check"></i><input type="password" id="confirma" placeholder="********" required></div>
          </div>
        </div>

        <button class="btn eco-btn" type="submit"><i class="ti ti-user-plus"></i> Criar conta</button>
      </form>

      <hr style="border:none; border-top:1px solid var(--color-border-tertiary); margin:1.25rem 0;">
      <p style="text-align:center; font-size:13px; color:var(--color-text-secondary); margin:0;">
        Ja tem conta? <a href="login.html" style="color:var(--verde); font-weight:500;">Fazer login</a>
      </p>
    </div>
  </div>

  <script src="js/comum.js"></script>
  <script>
    let perfil = 'cliente';
    document.getElementById('roles').addEventListener('click', (e) => {
      const r = e.target.closest('[data-role]');
      if (!r) return;
      document.querySelectorAll('.role').forEach((x) => x.classList.remove('active'));
      r.classList.add('active');
      perfil = r.dataset.role;
    });

    document.getElementById('form-cad').addEventListener('submit', async (e) => {
      e.preventDefault();
      const senha = document.getElementById('senha').value;
      if (senha !== document.getElementById('confirma').value) {
        return aviso('As senhas nao conferem.', true);
      }
      try {
        await apiPost('/api/cadastro', {
          nome: document.getElementById('nome').value,
          sobrenome: document.getElementById('sobrenome').value,
          email: document.getElementById('email').value,
          cnpj: document.getElementById('cnpj').value,
          senha,
          perfil,
        });
        aviso('Conta criada! Faca login.');
        setTimeout(() => location.href = 'login.html', 1200);
      } catch (err) {
        aviso(err.message, true);
      }
    });
  </script>
</body>
</html>
